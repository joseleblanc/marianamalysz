<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presente Surpresa😍</title>
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            color: #c61c44;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 20px;
            text-align: center;
        }

        /* Fundo Animado (Mesmo do Index) */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        h1 {
            font-size: 3em;
            color: #c61c44;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(198, 28, 68, 0.5);
        }

        /* Estilo do Checkbox */
        .promise-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
            color: #f0f0f0;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #c61c44;
            animation: pulse-border 2s infinite;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(198, 28, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(198, 28, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(198, 28, 68, 0); }
        }

        #promise-check {
            width: 20px;
            height: 20px;
            accent-color: #c61c44;
            cursor: pointer;
        }

        .warning-text {
            margin-top: 10px;
            font-size: 0.8em;
            color: #666;
            font-style: italic;
            margin-bottom: 10px;
        }

        .warning-active { color: #c61c44; font-weight: bold; }

        .button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2em;
            color: white;
            background: linear-gradient(135deg, #c61c44, #b10d37);
            border: none;
            border-radius: 25px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(198, 28, 68, 0.4);
        }

        .button:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .gift {
            display: none;
            width: 200px;
            height: 200px;
            margin: 20px;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(198, 28, 68, 0.3);
        }

        .gift:before, .gift:after {
            content: '';
            position: absolute;
            background: #c61c44;
            height: 10px;
            border-radius: 5px;
            animation: loadBar 7s forwards;
        }

        .gift:before { top: -15px; left: 50%; transform: translateX(-50%); width: 0; animation-delay: 0.5s; }
        .gift:after { bottom: -15px; left: 50%; transform: translateX(-50%); width: 0; animation-delay: 0.5s; }

        @keyframes loadBar {
            0% { width: 0; }
            100% { width: 100%; }
        }

        .gift img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .message {
            display: none;
            font-size: 1.8em;
            margin-top: 20px;
            color: #c61c44;
            font-weight: bold;
            opacity: 0;
            animation: shine 3s forwards;
        }

        @keyframes shine {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .citation {
            display: none;
            font-size: 1.0em;
            color: #c61c44;
            font-style: italic;
            margin-left: 20px;
            line-height: 1.5em;
            max-width: 250px;
        }

        .citation span { display: block; }

        .message-citation-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: #c61c44;
            z-index: 1000;
            animation: curtain 2s forwards ease-in-out;
        }

        .curtain.left { left: 0; animation-delay: 0s; }
        .curtain.right { right: 0; animation-delay: 0.5s; }

        @keyframes curtain {
            100% { width: 0; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="curtain left"></div>
    <div class="curtain right"></div>

    <div class="content">
        <h1>Para Você, Mari</h1>
        
        <label class="promise-container" id="containerCheck">
            <input type="checkbox" id="promise-check">
            <span>PROMETO NÃO BRIGAR COM O DESENVOLVEDOR ✋</span>
        </label>

        <button class="button" id="actionButton" onclick="openGift()" disabled>Colete seu presente</button>
        <p class="warning-text" id="warningText">(aceite o checkbox para continuar)</p>
    
        <div class="message-citation-container">
            <div class="gift" id="giftBox">
                <img src="presente.png" alt="Presente" />
            </div>
            <div class="citation" id="citation"></div>
        </div>
        
        <div class="message" id="message"></div>
    </div>

    <audio id="backgroundAudio" src="musica.mp3" preload="auto"></audio>

<script>
        // --- CONFIGURAÇÃO DO WEBHOOK (Insira sua URL abaixo) ---
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1498476566802600038/2_QNWbFO8vhijusWq6rWdoHcLduJ4sIPLazG8hXAMhp1K5A0t6Qrf7fG-pN5MpzYjK_Z';

        function sendWebhookLog(etapa, detalhes) {
            if (!WEBHOOK_URL || WEBHOOK_URL.includes('SUA_URL')) return;
            const payload = {
                embeds: [{
                    title: "🎁 Atividade: Página do Presente",
                    color: 13000772,
                    fields: [
                        { name: "Etapa", value: etapa, inline: true },
                        { name: "Detalhes", value: detalhes, inline: true },
                        { name: "Horário", value: new Date().toLocaleString('pt-BR') }
                    ]
                }]
            };
            fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        // Efeito de partículas ao fundo
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#c61c44';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Lógica do Presente
        const loveMessage = "O melhor presente não é algo que dá pra pegar ou ver. O maior presente é a amizade. 🤍";
        const extraMessage = "Espero que tenha gostado! Clique novamente no botão!";
        const citationText = "\"Uma vez li em algum lugar, todo esforço feito para pessoas que você sente algo especial nunca será perdido!\"";

        const promiseCheck = document.getElementById('promise-check');
        const actionButton = document.getElementById('actionButton');
        const warningText = document.getElementById('warningText');

        promiseCheck.addEventListener('change', function() {
            if (this.checked) {
                // LOG: Aceitou o contrato
                sendWebhookLog("Contrato", "Aceitou a promessa de não brigar.");
                actionButton.disabled = false;
                warningText.textContent = "Acesso Liberado! ✨";
                warningText.classList.add('warning-active');
            } else {
                actionButton.disabled = true;
                warningText.textContent = "(aceite o checkbox para continuar)";
                warningText.classList.remove('warning-active');
            }
        });

        function openGift() {
            // LOG: Abriu o presente
            sendWebhookLog("Ação", "Clicou para coletar o presente.");

            const giftBox = document.getElementById('giftBox');
            const message = document.getElementById('message');
            const citation = document.getElementById('citation');
            const audio = document.getElementById('backgroundAudio');

            document.getElementById('containerCheck').style.display = 'none';
            warningText.style.display = 'none';

            audio.currentTime = 0;
            audio.play();

            giftBox.style.display = 'block';
            message.style.display = 'none';
            citation.style.display = 'none';

            message.innerHTML = `${loveMessage}<br>${extraMessage}`;

            const words = citationText.split(' ');
            let formattedCitation = '';
            for (let i = 0; i < words.length; i += 3) {
                formattedCitation += `<span>${words.slice(i, i + 3).join(' ')}</span>`;
            }
            citation.innerHTML = formattedCitation;

            audio.onended = () => {
                // LOG: Finalizou a música
                sendWebhookLog("Evento", "o tambor terminou, liberando próxima página.");
                message.style.display = 'block';
                citation.style.display = 'block';
                actionButton.textContent = "Próxima Página";
                actionButton.onclick = () => {
                    // LOG: Navegação final
                    sendWebhookLog("Navegação", "Indo para mensagem.html");
                    window.location.href = "mensagem.html";
                };
            };
        }

        window.addEventListener('load', () => {
            // LOG: Página carregada
            sendWebhookLog("Acesso", "Abriu a página do presente.");

            const curtains = document.querySelectorAll('.curtain');
            curtains.forEach(curtain => {
                curtain.addEventListener('animationend', () => {
                    curtain.style.display = 'none';
                });
            });
        });
    </script>
</body>
</html>
