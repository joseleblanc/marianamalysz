<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Interativo - Memórias</title>
    <style>
        :root {
            --primary: #c61c44;
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --transition-speed: 0.8s;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg);
            /* O gradiente agora parte do preto para um tom bem escuro do seu vermelho */
            background-image: radial-gradient(circle at 50% 50%, #1a0409 0%, var(--bg) 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        #header-texto {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            color: var(--text);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }

        #header-texto h1 {
            font-size: 1.1rem;
            margin: 0;
            line-height: 1.4;
            font-weight: 300;
            letter-spacing: 1px;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 100;
        }

        #controles {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
            width: 100%;
        }

        #mensagem-input {
            width: 260px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(198, 28, 68, 0.3); /* Borda sutil com seu vermelho */
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            text-align: center;
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s ease;
        }

        #mensagem-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary); /* Foca com seu vermelho principal */
            width: 300px;
            box-shadow: 0 0 15px rgba(198, 28, 68, 0.2);
        }

        #mensagem-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #toolbar {
            display: flex;
            gap: 10px;
        }

        .btn-quadro {
            padding: 12px 22px; 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px;
            cursor: pointer; 
            backdrop-filter: blur(5px); 
            transition: 0.3s;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-quadro:active { transform: scale(0.95); }
        
        /* Botão Ativo com a sua cor primária */
        .ativo { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(198, 28, 68, 0.4);
        }

        #btn-enviar {
            background: #1a1a1a;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        #btn-enviar:hover {
            background: var(--primary);
            color: white;
        }

        canvas { display: block; touch-action: none; cursor: crosshair; }

        #status-msg {
            position: absolute; display: none; color: white; font-size: 1rem;
            text-align: center; z-index: 50; background: rgba(0,0,0,0.9);
            padding: 15px 30px; border-radius: 12px; border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .flash-active { animation: flashAnim 0.7s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="header-texto">
        <h1>Desenhe e escreva o que vier na sua mente quando recebeu esse link ou se lembra de mim!</h1>
    </div>

    <div id="flash"></div>
    <div id="status-msg">Processando captura... 🚀</div>

    <canvas id="canvas"></canvas>

    <div id="controles">
        <input type="text" id="mensagem-input" placeholder="Sua mensagem aqui escreva o que sente!" maxlength="100">
        
        <div id="toolbar">
            <button id="btn-giz" class="btn-quadro ativo" onclick="setModo('giz')">✏️ Giz</button>
            <button id="btn-borracha" class="btn-quadro" onclick="setModo('borracha')">🧼 Borracha</button>
            <button id="btn-enviar" class="btn-quadro" onclick="capturarEEnviar()">Enviar 📸</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const statusMsg = document.getElementById('status-msg');
        const inputMsg = document.getElementById('mensagem-input');
        
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1498467679097327670/ux0Y9AVqufg7tGCheSBXNc0WZvF2OYh2HRGKDJhqdm-KTq1eVKdajWsSofQKTNAYYmwC"; 

        let desenhando = false;
        let modo = 'giz';

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function setModo(m) {
            modo = m;
            document.getElementById('btn-giz').classList.toggle('ativo', m === 'giz');
            document.getElementById('btn-borracha').classList.toggle('ativo', m === 'borracha');
        }

        function getPos(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            return { x, y };
        }

        function iniciar(e) {
            if (e.target.id === 'mensagem-input') return;
            
            desenhando = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            
            if (modo === 'giz') {
                ctx.globalCompositeOperation = 'source-over';
                // O "Giz" agora é um branco levemente avermelhado para combinar
                ctx.strokeStyle = "rgba(255, 235, 240, 0.85)";
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
            } else {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 40;
            }
        }

        function mover(e) {
            if (!desenhando) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        async function capturarEEnviar() {
            const textoUsuario = inputMsg.value || "Sem mensagem.";

            flash.classList.add('flash-active');
            statusMsg.style.display = 'block';
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'desenho.png');
                formData.append('payload_json', JSON.stringify({
                    content: `🎨 **Nova memória recebida!**\n\n**Mensagem:** ${textoUsuario}`
                }));

                try {
                    const response = await fetch(DISCORD_WEBHOOK, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        statusMsg.innerHTML = "✅ Recebido! Até logo...";
                        setTimeout(() => {
                            window.location.href = "inicio.html";
                        }, 1500);
                    } else {
                        statusMsg.innerHTML = "❌ Erro ao enviar";
                        setTimeout(() => statusMsg.style.display = 'none', 2000);
                    }
                } catch (err) {
                    statusMsg.innerHTML = "❌ Erro de conexão";
                    setTimeout(() => statusMsg.style.display = 'none', 2000);
                }
            }, 'image/png');
        }

        canvas.addEventListener('mousedown', iniciar);
        window.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', () => desenhando = false);
        canvas.addEventListener('touchstart', (e) => { 
            if(e.target.id !== 'mensagem-input') e.preventDefault(); 
            iniciar(e); 
        });
        window.addEventListener('touchmove', (e) => { mover(e); });
        window.addEventListener('touchend', () => desenhando = false);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
