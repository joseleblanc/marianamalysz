<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Primeira Lembrança</title>
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            color: #c61c44;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Container do YouTube 16:9 */
        #videoContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #player {
            width: 100%;
            max-width: 800px; /* Tamanho ideal para desktop */
            aspect-ratio: 16 / 9; /* Mantém a proporção exata */
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(198, 28, 68, 0.4);
            border: 2px solid rgba(198, 28, 68, 0.3);
        }

        /* Fundo Dinâmico */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(198, 28, 68, 0.5);
            animation: fadeInDown 1s ease;
        }

        p {
            font-size: 1.3em;
            margin-bottom: 30px;
            color: #f0f0f0;
            animation: fadeIn 1.5s ease;
        }

        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        input[type="text"] {
            padding: 15px;
            font-size: 1.5em;
            border-radius: 10px;
            border: 2px solid #c61c44;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            width: 250px;
            display: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 20px rgba(198, 28, 68, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        .button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2em;
            color: white;
            background: linear-gradient(135deg, #c61c44, #b10d37);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(198, 28, 68, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-top: 10px;
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(198, 28, 68, 0.5);
        }

        #feedback {
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 50px;
            max-width: 400px;
        }

        /* Animações */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .error-shake { animation: shake 0.5s; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .volume-control {
            position: absolute;
            bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <div id="videoContainer">
        <div id="player"></div>
        <p id="videoHint" style="margin-top: 20px; font-size: 1.1em; color: #f0f0f0; font-style: italic;">
            Assista a mensagem completa para começar... ❤️
        </p>
    </div>

    <div id="mainWrapper" style="display: none; opacity: 0; transition: opacity 1.5s ease; width: 100%;">
        <canvas id="bg-canvas"></canvas>

        <div id="gameContent">
            <h1>Um pequeno desafio...</h1>
            <p>Para provar que é você, que dia nos vimos pela primeira vez?</p>
            
            <div class="input-container">
                <button class="button" id="startButton" onclick="startGame()">Começar Desafio</button>
                <input type="text" id="guessInput" placeholder="DD/MM/AAAA" maxlength="10" oninput="formatDate()">
                <button class="button" id="submitBtn" onclick="checkAnswer()" style="display: none;">Verificar</button>
                <div id="feedback"></div>
            </div>
        </div>

        <div id="resultContent" style="display: none;">
            <h1>Parabéns! ❤️</h1>
            <div id="finalScore" style="color: #f0f0f0; line-height: 1.6; margin: 20px 0;"></div>
            <button id="prizeButton" class="button" onclick="redirectToPrize()">Recolher Recompensa</button>
        </div>

        <audio id="backgroundAudio" src="sound.mp3" preload="auto" loop></audio>

        <div class="volume-control">
            <label style="font-size: 0.8em; color: #888;">Volume:</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.15" onchange="setVolume()">
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // --- CONFIGURAÇÃO DO PLAYER ---
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'j2oV0Cjm1nc', // Troque pelo ID do seu vídeo!
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Detecta quando o vídeo termina
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                revealGame();
            }
        }

        function revealGame() {
            const videoContainer = document.getElementById('videoContainer');
            const mainWrapper = document.getElementById('mainWrapper');
            
            videoContainer.style.opacity = '0';
            setTimeout(() => {
                videoContainer.style.display = 'none';
                mainWrapper.style.display = 'block';
                setTimeout(() => { 
                    mainWrapper.style.opacity = '1';
                    initParticles(); 
                }, 50);
            }, 1000);
        }

        // --- PARTÍCULAS ---
        function initParticles() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for(let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#c61c44';
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    p.y -= p.speed;
                    if(p.y < 0) p.y = canvas.height;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- LÓGICA DO JOGO ---
        const correctAnswers = ["07/02/23", "07/02/2023", "7 de fevereiro", "7/2", "7 de fev", "07-02-2023", "7-2-23", "7 fevereiro"];
        const hints = [
            "Dica: Foi no início de Fevereiro de 2023...",
            "Dica: Pensa no teu primeiro dia no Colegio Integrado +1",
            "Dica Final: Foi no dia 07/02/2023!"
        ];
        let hintIndex = 0;

        function startGame() {
            document.getElementById('guessInput').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('startButton').style.display = 'none';
            document.getElementById('backgroundAudio').play();
            document.getElementById('guessInput').focus();
        }

        function formatDate() {
            const input = document.getElementById('guessInput');
            let value = input.value.replace(/\D/g, '');
            if (value.length >= 2) value = value.slice(0, 2) + '/' + value.slice(2);
            if (value.length >= 5) value = value.slice(0, 5) + '/' + value.slice(5);
            input.value = value;
        }

        function checkAnswer() {
            const input = document.getElementById('guessInput');
            const userAnswer = input.value.toLowerCase();
            const feedback = document.getElementById('feedback');

            if (correctAnswers.includes(userAnswer)) {
                feedback.innerHTML = "<p style='color: #00ff88; font-weight: bold;'>Exatamente! ❤️</p>";
                setTimeout(showFinalResult, 1000);
            } else {
                input.classList.add('error-shake');
                setTimeout(() => input.classList.remove('error-shake'), 500);
                
                if (hintIndex < hints.length) {
                    feedback.innerHTML = `<p style='color: #ff4444;'>Ainda não... Tenta outra vez!</p>
                                        <p style='color: #888; font-size: 0.9em; margin-top: 10px;'>${hints[hintIndex]}</p>`;
                    hintIndex++;
                } else {
                    feedback.innerHTML = `<p style='color: #ff4444;'>Não desistas!</p>`;
                }
            }
        }

        function showFinalResult() {
            document.getElementById('gameContent').style.display = 'none';
            document.getElementById('resultContent').style.display = 'block';
            
            const finalMessage = `
                Oi Mari, que bom que você chegou aqui!<br><br>
                Não importa quantas vezes tentou, o que importa é que não desistiu.<br>
                Clica no botão abaixo para receber o que preparei para você.
            `;
            document.getElementById('finalScore').innerHTML = finalMessage;
        }

        function redirectToPrize() {
            window.location.href = 'jogo.html';
        }

        function setVolume() {
            document.getElementById('backgroundAudio').volume = document.getElementById('volumeSlider').value;
        }
    </script>
</body>
</html>
